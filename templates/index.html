<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>KPI Licence Agreement</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }
        .container {
            background: white;
            padding: 40px;
            border-radius: 16px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
            width: 100%;
            max-width: 500px;
        }
        h1 { color: #333; margin-bottom: 8px; font-size: 24px; }
        .subtitle { color: #666; margin-bottom: 30px; font-size: 14px; }
        .form-group { margin-bottom: 20px; }
        label { display: block; margin-bottom: 6px; color: #555; font-weight: 500; font-size: 14px; }
        input {
            width: 100%;
            padding: 12px 16px;
            border: 2px solid #e0e0e0;
            border-radius: 8px;
            font-size: 15px;
            font-family: inherit;
        }
        input:focus { outline: none; border-color: #667eea; }
        input[type="date"] {
            cursor: pointer;
        }
        .row { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; }
        button {
            width: 100%;
            padding: 14px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: transform 0.2s, box-shadow 0.2s;
        }
        button:hover { transform: translateY(-2px); box-shadow: 0 8px 20px rgba(102, 126, 234, 0.4); }
        .logo { text-align: center; margin-bottom: 20px; }
        .logo-text {
            font-size: 28px;
            font-weight: 800;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }
        /* Custom date picker styling */
        ::-webkit-calendar-picker-indicator {
            cursor: pointer;
            opacity: 0.6;
            transition: 0.2s;
        }
        ::-webkit-calendar-picker-indicator:hover {
            opacity: 1;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="logo"><div class="logo-text">KPI</div></div>
        <h1>Licence Agreement</h1>
        <p class="subtitle">Generate professional licence agreements instantly</p>
        
        <form action="/generate" method="POST">
            <div class="form-group">
                <label>Full Name</label>
                <input type="text" name="name" placeholder="e.g. John Smith" required>
            </div>
            <div class="row">
                <div class="form-group">
                    <label>Agreement Date</label>
                    <input type="date" name="agreement_date" required>
                </div>
                <div class="form-group">
                    <label>Start Date</label>
                    <input type="date" name="start_date" required>
                </div>
            </div>
            <div class="form-group">
                <label>End Date</label>
                <input type="date" name="end_date">
            </div>
            <div class="row">
                <div class="form-group">
                    <label>Room Number</label>
                    <input type="text" name="room" placeholder="e.g. A" required>
                </div>
                <div class="form-group">
                    <label>Reference (optional)</label>
                    <input type="text" name="ref" placeholder="Auto-generated if blank">
                </div>
            </div>
            <div class="row">
                <div class="form-group">
                    <label>Monthly Rent (£)</label>
                    <input type="text" name="rent" placeholder="850" required>
                </div>
                <div class="form-group">
                    <label>Deposit (£)</label>
                    <input type="text" name="deposit" placeholder="1400" required>
                </div>
            </div>
            <div class="form-group">
                <label>Property Address</label>
                <input type="text" name="property" value="123 Daren Avenue SE1 4FR">
            </div>
            <button type="submit">Generate Agreement</button>
        </form>
    </div>
</body>
</html>
